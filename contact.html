<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Concierge</title>

<link rel="stylesheet" href="style.css">

</head>

<body class="concierge-page">

<section class="concierge-section">

    <h1>Vehicle Concierge</h1>

    <p>
        Reserve private consultation for your selected vehicle.
    </p>

    <form class="concierge-form">

        <input type="text"
               placeholder="Full Name"
               required>

        <input type="email"
               placeholder="Email Address"
               required>

        <input type="text"
               placeholder="Desired Vehicle"
               required>

        <textarea placeholder="Your Message"
                  required></textarea>

        <button type="submit">
            Submit Inquiry
        </button>

    </form>

</section>

</body>

</html>
